<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="monetag" content="b25221de09b5182ae7a50b9dd437701c">
    <meta charset="UTF-8">
    <title>Merge Garden</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Your Monetag Script goes here! -->
    <script src="https://alwingulla.com/88/tag.min.js" data-zone="XXXXXX" async data-cfasync="false"></script>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Merge Garden</h1>
            <div class="score-container">
                <div class="score-board">
                    <span>Score:</span>
                    <span id="score">0</span>
                </div>
                <div class="score-board high-score-board">
                    <span>Best:</span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </header>

        <div class="grid-container" id="grid">
            <!-- Grid generated by JS -->
        </div>

        <div class="controls">
            <button id="spawn-btn" class="glow-button">Spawn Seed</button>
        </div>
        
        <div id="particle-container"></div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>No more moves left.</p>
                <div class="final-score">Final Score: <span id="final-score-display">0</span></div>
                <button id="restart-btn" class="glow-button restart-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
